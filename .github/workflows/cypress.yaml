name: Jupiter Cypress TypeScript Framework - E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Cypress tests
        run: npm run all:tests

      - name: Upload Mochawesome Reports
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports
          path: reports/
